<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Admin Dashboard</h1>
            <nav class="nav">
                <a href="#" class="btn btn-primary" id="logoutBtn">Logout</a>
            </nav>
        </header>

        <div class="card mb-4">
            <h2 class="mb-2">Total System Progress</h2>
            <div class="progress-bar">
                <div class="progress-fill" id="taskProgress" style="width: 0%;"></div>
            </div>
            <p class="mt-4" id="progressText" style="font-weight: 500;">0 / 0 Completed</p>
        </div>

        <div class="filters">
            <input type="text" id="searchInput" class="form-control" placeholder="Search all tasks..." style="flex: 1; min-width: 200px;">
            <select id="filterCategory" class="form-control" style="width: auto;">
                <option value="">All Categories</option>
                <option value="Work">Work</option>
                <option value="Personal">Personal</option>
            </select>
            <select id="filterPriority" class="form-control" style="width: auto;">
                <option value="">All Priorities</option>
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
            </select>
            <select id="filterStatus" class="form-control" style="width: auto;">
                <option value="">All Statuses</option>
                <option value="Pending">Pending</option>
                <option value="Completed">Completed</option>
            </select>
            <button id="showAddTaskModal" class="btn btn-primary">Add Task</button>
        </div>

        <div class="grid grid-cols-3" id="taskList"></div>
    </div>

    <div class="modal-overlay" id="taskModal">
        <div class="modal">
            <h2 id="modalTitle" class="mb-4">Add Task</h2>
            <form id="taskForm">
                <div class="form-group">
                    <label class="form-label">Title</label>
                    <input type="text" id="taskTitle" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea id="taskDesc" class="form-control" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Category</label>
                    <select id="taskCategory" class="form-control" required>
                        <option value="Work">Work</option>
                        <option value="Personal">Personal</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Priority</label>
                    <select id="taskPriority" class="form-control" required>
                        <option value="High">High</option>
                        <option value="Medium">Medium</option>
                        <option value="Low">Low</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Deadline</label>
                    <input type="date" id="taskDeadline" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Status</label>
                    <select id="taskStatus" class="form-control" required>
                        <option value="Pending">Pending</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>
                <div class="filters mt-4" style="justify-content: flex-end; margin-bottom: 0;">
                    <button type="button" class="btn" id="closeTaskModal" style="background: var(--bg); color: var(--text-main);">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="deleteModal">
        <div class="modal">
            <h2 class="mb-4">Delete Task</h2>
            <p class="mb-4">Are you sure you want to delete this task? This action cannot be undone.</p>
            <div class="filters" style="justify-content: flex-end; margin-bottom: 0;">
                <button type="button" class="btn" id="cancelDeleteModal" style="background: var(--bg); color: var(--text-main);">Cancel</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
